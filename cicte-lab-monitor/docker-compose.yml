version: '3.8'

services:
  cicte-monitor:
    build: .
    container_name: cicte-lab-monitor
    restart: unless-stopped
    ports:
      - "3001:3001"
    environment:
      - NODE_ENV=production
      - PORT=3001
    # Load secrets from .env file (copy .env.example → .env and fill in values; never commit .env)
    env_file:
      - .env

